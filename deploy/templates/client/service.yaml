apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-client
  labels:
    app.kubernetes.io/name: mula-client
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mula-ai
    app.kubernetes.io/component: client
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: {{ .Values.client.tag | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mula-client
  ports:
    - port: 3000
      name: http
      targetPort: 3000
