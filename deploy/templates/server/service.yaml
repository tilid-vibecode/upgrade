apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app.kubernetes.io/name: mula-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mula-ai
    app.kubernetes.io/component: server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: {{ .Values.server.tag | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mula-server
  ports:
    - port: 8000
      name: http
      targetPort: 8000
