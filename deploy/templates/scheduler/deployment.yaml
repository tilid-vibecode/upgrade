{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scheduler
  labels:
    app.kubernetes.io/name: mula-scheduler
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mula-ai
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/managed-by: Helm
spec:
  # Always 1 replica — leader lock prevents duplicate dispatches during rollouts
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mula-scheduler
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mula-scheduler
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: mula-ai
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: {{ .Values.server.tag | quote }}
      annotations:
        deploy/tag: {{ .Values.server.tag | quote }}
        deploy/commit: {{ default "" .Values.server.commitSha | quote }}
    spec:
      {{- if eq .Values.environment "staging" }}
      tolerations:
        - key: "eks.amazonaws.com/capacityType"
          operator: "Equal"
          value: "SPOT"
          effect: "NoSchedule"
      {{- end }}
      # Allow leader lock release + current tick to finish
      terminationGracePeriodSeconds: 30
      containers:
        - name: scheduler
          image: "{{ .Values.registry }}/{{ .Values.server.image }}:{{ .Values.server.tag }}"
          imagePullPolicy: {{ .Values.server.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-server-config
            - secretRef:
                name: {{ .Release.Name }}-server-secrets
            {{- if .Values.queue.enabled }}
            {{- if eq .Values.queue.type "redis" }}
            - secretRef:
                name: redis-auth
            {{- end }}
            {{- end }}
          env:
            - name: SERVICE
              value: "scheduler"
            - name: SCHEDULER_TICK_SECONDS
              value: {{ .Values.scheduler.tickSeconds | default "5" | quote }}
            - name: SCHEDULER_LEADER_TTL
              value: {{ .Values.scheduler.leaderTtlSeconds | default "30" | quote }}
            - name: SERVICE_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: SENTRY_RELEASE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            {{- if .Values.server.observability.enabled }}
            - name: OTEL_ENABLE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.server.observability.otel.service_name | default "mula-server" }}-scheduler
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.server.observability.otel.exporter_otlp_endpoint | default "" }}
            {{- if .Values.server.observability.otel.auth_token.enabled }}
            - name: OTEL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.observability.otel.auth_token.secret_name }}
                  key: {{ .Values.server.observability.otel.auth_token.secret_key }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.server.observability.otel.log_level | default "INFO" | quote }}
            - name: ENABLE_JSON_LOGGING
              value: {{ ternary "true" "false" .Values.server.observability.otel.enable_json_logging | quote }}
            {{- end }}
          {{- with .Values.scheduler.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.scheduler.livenessProbe.enabled }}
          # Startup probe: allows time for migration gate + first
          # heartbeat write.  Once it passes, liveness takes over.
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /tmp/scheduler-heartbeat"
            periodSeconds: 5
            failureThreshold: 12   # 60s total budget for migrations + boot
          # Liveness probe: heartbeat is written on EVERY loop
          # iteration (leader AND standby), so this verifies the
          # process loop is running, not that it holds leadership.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test $(( $(date +%s) - $(stat -c %Y /tmp/scheduler-heartbeat 2>/dev/null || echo 0) )) -lt 60"
            periodSeconds: 15
            failureThreshold: 3
          {{- end }}
{{- end }}
