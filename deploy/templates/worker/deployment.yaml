{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mula-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mula-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: mula-ai
        app.kubernetes.io/component: worker
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: {{ .Values.server.tag | quote }}
      annotations:
        deploy/tag: {{ .Values.server.tag | quote }}
        deploy/commit: {{ default "" .Values.server.commitSha | quote }}
    spec:
      {{- if eq .Values.environment "staging" }}
      tolerations:
        - key: "eks.amazonaws.com/capacityType"
          operator: "Equal"
          value: "SPOT"
          effect: "NoSchedule"
      {{- end }}
      # Graceful shutdown: let Dramatiq finish in-flight tasks
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: "{{ .Values.registry }}/{{ .Values.server.image }}:{{ .Values.server.tag }}"
          imagePullPolicy: {{ .Values.server.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-server-config
            - secretRef:
                name: {{ .Release.Name }}-server-secrets
            {{- if .Values.queue.enabled }}
            {{- if eq .Values.queue.type "redis" }}
            - secretRef:
                name: redis-auth
            {{- end }}
            {{- end }}
          env:
            - name: SERVICE
              value: "worker"
            - name: DRAM_PROCS
              value: {{ .Values.worker.processes | quote }}
            - name: DRAM_THREADS
              value: {{ .Values.worker.threads | quote }}
            - name: SERVICE_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: SENTRY_RELEASE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            {{- if .Values.minio.enabled }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.auth.secretName }}
                  key: {{ .Values.minio.auth.accessKeyRef }}
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.auth.secretName }}
                  key: {{ .Values.minio.auth.secretKeyRef }}
            {{- end }}
            {{- if .Values.server.observability.enabled }}
            - name: OTEL_ENABLE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.server.observability.otel.service_name | default "mula-server" }}-worker
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.server.observability.otel.exporter_otlp_endpoint | default "" }}
            {{- if .Values.server.observability.otel.auth_token.enabled }}
            - name: OTEL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.observability.otel.auth_token.secret_name }}
                  key: {{ .Values.server.observability.otel.auth_token.secret_key }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.server.observability.otel.log_level | default "INFO" | quote }}
            - name: ENABLE_JSON_LOGGING
              value: {{ ternary "true" "false" .Values.server.observability.otel.enable_json_logging | quote }}
            {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
